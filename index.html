<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slim Verzekeren — binnenkort</title>
<meta name="description" content="Hier komt iets slims. Een initiatief van Bouvy Advies.">
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0A0A0B;
    --paper:#F4F4EF;
    --muted:rgba(244,244,239,.45);
    --line:rgba(244,244,239,.12);
    --accent:#CDFF50;
    --font:"Space Grotesk",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:var(--font);
    background:var(--ink);
    color:var(--paper);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }
  /* signature glow — one subtle drifting light */
  body::before{
    content:"";
    position:fixed;
    top:-30%;left:50%;
    width:90vmax;height:90vmax;
    transform:translateX(-50%);
    background:radial-gradient(circle, rgba(205,255,80,.10) 0%, rgba(205,255,80,.03) 35%, transparent 65%);
    pointer-events:none;
    animation:breathe 11s ease-in-out infinite;
  }
  @keyframes breathe{
    0%,100%{transform:translateX(-50%) scale(1);opacity:.85}
    50%{transform:translateX(-50%) scale(1.12);opacity:1}
  }

  /* header / hidden login trigger */
  header{
    position:relative;z-index:2;
    padding:clamp(22px,4vw,40px);
    display:flex;align-items:center;justify-content:space-between;gap:16px;
  }
  .loginlink{
    appearance:none;cursor:pointer;
    font-family:var(--font);font-size:13.5px;font-weight:500;letter-spacing:.02em;
    color:var(--paper);background:rgba(244,244,239,.06);
    border:1px solid var(--line);border-radius:999px;padding:9px 18px;
    transition:background .2s ease, border-color .2s ease, transform .15s ease;
  }
  .loginlink:hover{background:rgba(205,255,80,.12);border-color:var(--accent)}
  .loginlink:active{transform:scale(.98)}
  .loginlink:focus-visible{outline:1px dashed var(--line);outline-offset:4px}
  .logo{
    appearance:none;border:0;background:none;cursor:pointer;
    font-family:var(--font);color:var(--paper);
    font-size:clamp(15px,1.5vw,18px);font-weight:700;letter-spacing:-.01em;
    display:inline-flex;align-items:center;gap:.45em;
    padding:6px 2px;
  }
  .logo .dot{width:.42em;height:.42em;border-radius:50%;background:var(--accent);
    transition:transform .35s ease, box-shadow .35s ease;}
  .logo span{opacity:.55;font-weight:500;transition:opacity .3s ease}
  .logo:hover .dot{transform:scale(1.35);box-shadow:0 0 18px rgba(205,255,80,.7)}
  .logo:hover span{opacity:.85}
  .logo:focus-visible{outline:1px dashed var(--line);outline-offset:6px;border-radius:4px}

  /* center stage */
  main{
    position:relative;z-index:2;
    flex:1;display:flex;flex-direction:column;justify-content:center;
    padding:0 clamp(22px,6vw,80px);
    max-width:1100px;
  }
  h1{
    font-size:clamp(40px,8vw,108px);
    font-weight:700;line-height:.98;letter-spacing:-.035em;
  }
  h1 .accent{color:var(--accent)}
  .caret{
    display:inline-block;width:.06em;height:.92em;
    background:var(--accent);margin-left:.08em;vertical-align:-8%;
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  p.sub{
    margin-top:clamp(20px,3vw,30px);
    font-size:clamp(16px,2vw,22px);font-weight:400;
    color:var(--muted);max-width:30ch;line-height:1.45;
  }
  .tag{
    margin-top:clamp(34px,5vw,52px);
    display:inline-flex;align-items:center;gap:.6em;
    font-size:13px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--accent);font-weight:500;
  }
  .tag::before{content:"";width:30px;height:1px;background:var(--accent);opacity:.6}

  /* footer */
  footer{
    position:relative;z-index:2;
    padding:clamp(22px,4vw,40px);
    display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap;
    font-size:13px;color:var(--muted);border-top:1px solid var(--line);margin-top:auto;
  }
  footer a{color:var(--muted);text-decoration:none;transition:color .25s ease}
  footer a:hover{color:var(--paper)}
  .hint{font-size:11.5px;letter-spacing:.04em;opacity:.7}

  /* login overlay */
  .overlay{
    position:fixed;inset:0;z-index:50;
    background:rgba(5,5,6,.72);backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;padding:24px;
    opacity:0;visibility:hidden;transition:opacity .28s ease, visibility .28s ease;
  }
  .overlay.open{opacity:1;visibility:visible}
  .card{
    width:100%;max-width:380px;
    background:#101012;border:1px solid var(--line);border-radius:16px;
    padding:clamp(26px,4vw,36px);
    transform:translateY(14px) scale(.98);transition:transform .3s cubic-bezier(.2,.8,.2,1);
    box-shadow:0 30px 80px rgba(0,0,0,.55);
  }
  .overlay.open .card{transform:none}
  .card h2{font-size:22px;font-weight:700;letter-spacing:-.02em}
  .card .lead{margin-top:6px;font-size:13.5px;color:var(--muted)}
  .field{margin-top:18px}
  .field label{display:block;font-size:12px;letter-spacing:.04em;color:var(--muted);margin-bottom:7px}
  .field input{
    width:100%;background:#0A0A0B;border:1px solid var(--line);border-radius:9px;
    padding:12px 14px;color:var(--paper);font-family:var(--font);font-size:15px;
    transition:border-color .2s ease;
  }
  .field input:focus{outline:none;border-color:var(--accent)}
  .btn{
    width:100%;margin-top:22px;padding:13px;border:0;border-radius:9px;cursor:pointer;
    background:var(--accent);color:#0A0A0B;font-family:var(--font);font-weight:700;font-size:15px;
    transition:transform .15s ease, filter .2s ease;
  }
  .btn:hover{filter:brightness(1.05)}
  .btn:active{transform:scale(.99)}
  .note{margin-top:16px;font-size:12px;color:var(--muted);text-align:center;line-height:1.5}
  .note.show-msg{color:var(--accent)}
  .close{
    position:absolute;top:16px;right:18px;background:none;border:0;cursor:pointer;
    color:var(--muted);font-size:22px;line-height:1;transition:color .2s ease;
  }
  .close:hover{color:var(--paper)}
  .card{position:relative}

  @media (max-width:600px){
    footer{flex-direction:column;align-items:flex-start}
  }
</style>
</head>
<body>

  <header>
    <button class="logo" id="logoBtn" aria-label="Naar het portaal">
      <span class="dot"></span>slim<span>verzekeren</span>
    </button>
    <button class="loginlink" id="loginLink">Inloggen</button>
  </header>

  <main>
    <h1>Hier komt<br>iets <span class="accent">slims</span>.<span class="caret"></span></h1>
    <p class="sub">We zijn nog even de kleine lettertjes aan het weghalen.</p>
    <div class="tag">binnenkort</div>
  </main>

  <footer>
    <div>Een initiatief van <strong style="font-weight:500;color:var(--paper)">Bouvy Advies</strong> &nbsp;·&nbsp; <a href="tel:0352031966">035 203 1966</a></div>
    <div class="hint">© Bouvy Advies</div>
  </footer>

  <!-- verborgen login -->
  <div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <div class="card">
      <button class="close" id="closeBtn" aria-label="Sluiten">&times;</button>
      <h2 id="loginTitle">Even inloggen</h2>
      <p class="lead">Voor het team van Bouvy Advies.</p>
      <form id="loginForm">
        <div class="field">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" name="email" autocomplete="username" placeholder="naam@bouvy.nl" required>
        </div>
        <div class="field">
          <label for="pw">Wachtwoord</label>
          <input type="password" id="pw" name="pw" autocomplete="current-password" placeholder="••••••••" required>
        </div>
        <button class="btn" type="submit">Inloggen</button>
        <p class="note" id="note">Het portaal is nog in aanbouw — login wordt binnenkort actief.</p>
      </form>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const logoBtn = document.getElementById('logoBtn');
    const closeBtn = document.getElementById('closeBtn');
    const form = document.getElementById('loginForm');
    const note = document.getElementById('note');

    function open(){ overlay.classList.add('open'); setTimeout(()=>document.getElementById('email').focus(),120); }
    function close(){ overlay.classList.remove('open'); note.textContent='Het portaal is nog in aanbouw — login wordt binnenkort actief.'; note.classList.remove('show-msg'); }

    logoBtn.addEventListener('click', open);
    document.getElementById('loginLink').addEventListener('click', open);
    closeBtn.addEventListener('click', close);
    overlay.addEventListener('click', e => { if(e.target === overlay) close(); });
    document.addEventListener('keydown', e => { if(e.key === 'Escape') close(); });

    form.addEventListener('submit', e => {
      e.preventDefault();
      // Placeholder — hier komt later de echte login-koppeling.
      note.textContent = 'Bijna! De login is nog niet aangesloten. Dit portaal volgt binnenkort.';
      note.classList.add('show-msg');
    });
  </script>

</body>
</html>
